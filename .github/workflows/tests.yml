name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12", "3.13"]
        numpy-version: [""]
        include:
          # Test Python 3.11 with both numpy 1.x and 2.x
          - os: ubuntu-latest
            python-version: "3.11"
            numpy-version: "<2.0"
          - os: ubuntu-latest
            python-version: "3.11"
            numpy-version: ">=2.0"
          - os: windows-latest
            python-version: "3.11"
            numpy-version: "<2.0"
          - os: windows-latest
            python-version: "3.11"
            numpy-version: ">=2.0"
          - os: macos-latest
            python-version: "3.11"
            numpy-version: "<2.0"
          - os: macos-latest
            python-version: "3.11"
            numpy-version: ">=2.0"

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for setuptools-scm versioning

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ matrix.numpy-version }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[tests]

    - name: Install specific numpy version
      if: matrix.numpy-version != ''
      run: |
        pip install "numpy${{ matrix.numpy-version }}"

    - name: Run tests
      run: |
        pytest pyexodus/tests

  test-coverage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[tests]
        pip install pytest-cov

    - name: Run tests with coverage
      run: |
        pytest pyexodus/tests --cov=pyexodus --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
